name: Build & Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install backend dependencies
        working-directory: ./implementation/backend
        run: npm ci
      
      - name: Run backend tests
        working-directory: ./implementation/backend
        run: npm test
      
      - name: Install frontend dependencies
        working-directory: ./implementation/frontend
        run: npm ci
      
      - name: Run frontend tests
        working-directory: ./implementation/frontend
        run: npm test
      
      - name: Run linter
        run: npm run lint || true

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Login to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      
      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./implementation/backend
          push: true
          tags: |
            ${{ secrets.REGISTRY_LOGIN_SERVER }}/turf-api:latest
            ${{ secrets.REGISTRY_LOGIN_SERVER }}/turf-api:${{ github.sha }}
      
      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./implementation/frontend
          push: true
          tags: |
            ${{ secrets.REGISTRY_LOGIN_SERVER }}/turf-frontend:latest
            ${{ secrets.REGISTRY_LOGIN_SERVER }}/turf-frontend:${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy to Azure
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
        run: |
          echo "Deploying to Azure..."
          # Add deployment commands here
