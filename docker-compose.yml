version: '3.8'
services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
  mongo:
    image: mongo:6
    ports:
      - '27017:27017'
  backend:
    build: ./backend
    environment:
      - REDIS_URL=redis://redis:6379
      - MONGO_URL=mongodb://mongo:27017/theturf
    depends_on:
      - redis
      - mongo
    ports:
      - '3000:3000'
  ai-commentary:
    build: ./ai/commentary_service
    ports:
      - '8000:8000'
    depends_on:
      - redis
